<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Clothing Store</title>
  <link rel="stylesheet" href="css/clothing.css">
</head>
<body>
  <header>
    <nav>
      <h1>Clothing Store</h1>
      <ul>
        <li><a href="#">Home</a></li>
        <li><a href="#">Shop</a></li>
        <li><a href="#">Contact</a></li>
        <li><a href="#">Cart</a></li>
      </ul>
    </nav>
  </header>
  <main>
    <section class="products">
      <div class="product">
        <img src="tshirt.jpg" alt="T-shirt">
        <h2>Classic T-shirt</h2>
        <p>$20</p>
        <button>Add to Cart</button>
      </div>
      <div class="product">
        <img src="jeans.jpg" alt="Jeans">
        <h2>Blue Jeans</h2>
        <p>$40</p>
        <button>Add to Cart</button>
      </div>
      <div class="product">
        <img src="dress.jpg" alt="Dress">
        <h2>Summer Dress</h2>
        <p>$35</p>
        <button>Add to Cart</button>
      </div>
    </section>
  </main>
  <footer>
    <p>&copy; 2025 Clothing Store. All rights reserved.</p>
  </footer>
</body>
</html>
