<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/product card.css" />
    <title>3D Product Card</title>
  </head>
  <body>
    <div class="container">
      <div class="card">
        <div class="car">
          <img src="img/2024 Toyota Land Cruiser .jpg" alt="Toyota Land Cruiser 2024" />
        </div>
        <div class="info">
          <h1 class="title">Toyota Land Cruiser 2024</h1>
          <h3>
            FUTURE ADVENTURE AWAIST WITH OUR AMAZING LAND CRUISER.
          </h3>
          <div class="sizes">
            <button>White</button>
            <button>Blue</button>
            <button class="active">Gold</button>
            <button>Grey</button>
          </div>
          <div class="purchase">
            <button>Purchase</button>
          </div>
        </div>
      </div>
    </div>
    <script src="product card.js"></script>
  </body>
</html>
